<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="13">

  <!-- Background -->
  <rect width="900" height="580" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">KijaniKiosk Capstone — Track A Architecture</text>

  <!-- Jenkins Box -->
  <rect x="320" y="60" width="260" height="70" rx="8" fill="#2196F3" stroke="#1565C0" stroke-width="2"/>
  <text x="450" y="90" text-anchor="middle" fill="white" font-weight="bold" font-size="14">Jenkins Pipeline</text>
  <text x="450" y="112" text-anchor="middle" fill="#E3F2FD" font-size="11">host-agent (kubectl + terraform + ansible)</text>

  <!-- Arrow Jenkins down-left to Terraform -->
  <line x1="370" y1="130" x2="200" y2="200" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="250" y="178" text-anchor="middle" fill="#333" font-size="11">terraform apply</text>

  <!-- Arrow Jenkins down-right to Ansible -->
  <line x1="530" y1="130" x2="530" y2="198" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="580" y="175" text-anchor="middle" fill="#333" font-size="11">ansible-playbook</text>

  <!-- Terraform Box -->
  <rect x="60" y="200" width="200" height="60" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="2"/>
  <text x="160" y="226" text-anchor="middle" fill="white" font-weight="bold">Terraform</text>
  <text x="160" y="248" text-anchor="middle" fill="#E1BEE7" font-size="11">provisions namespace</text>

  <!-- Ansible Box -->
  <rect x="420" y="200" width="220" height="60" rx="8" fill="#E65100" stroke="#BF360C" stroke-width="2"/>
  <text x="530" y="226" text-anchor="middle" fill="white" font-weight="bold">Ansible</text>
  <text x="530" y="248" text-anchor="middle" fill="#FFE0B2" font-size="11">configures staging env vars</text>

  <!-- Arrow Terraform to Staging -->
  <line x1="160" y1="260" x2="160" y2="318" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="100" y="295" text-anchor="middle" fill="#333" font-size="11">kubectl apply</text>

  <!-- Arrow Ansible to Staging -->
  <line x1="490" y1="260" x2="320" y2="318" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="440" y="300" text-anchor="middle" fill="#333" font-size="11">ConfigMap + Secret</text>

  <!-- Staging Namespace Box -->
  <rect x="40" y="320" width="340" height="120" rx="8" fill="#1B5E20" stroke="#388E3C" stroke-width="2"/>
  <text x="210" y="348" text-anchor="middle" fill="white" font-weight="bold" font-size="14">kijani-staging namespace</text>
  <text x="210" y="370" text-anchor="middle" fill="#C8E6C9" font-size="11">kk-payments x3 replicas (nginx:alpine)</text>
  <text x="210" y="390" text-anchor="middle" fill="#C8E6C9" font-size="11">DB_HOST: postgres-staging-service</text>
  <text x="210" y="410" text-anchor="middle" fill="#C8E6C9" font-size="11">NODE_ENV: staging</text>
  <text x="210" y="428" text-anchor="middle" fill="#A5D6A7" font-size="10">Smoke test: wget localhost:80 -> 200 OK</text>

  <!-- Approval Gate Box -->
  <rect x="360" y="355" width="200" height="60" rx="8" fill="#F57F17" stroke="#E65100" stroke-width="2"/>
  <text x="460" y="381" text-anchor="middle" fill="white" font-weight="bold">Approval Gate</text>
  <text x="460" y="400" text-anchor="middle" fill="#FFF9C4" font-size="11">input: DEPLOY_REASON</text>

  <!-- Arrow Staging to Approval -->
  <line x1="380" y1="380" x2="362" y2="380" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="310" y="372" text-anchor="middle" fill="#333" font-size="10">smoke test passed</text>

  <!-- Arrow Approval to Production -->
  <line x1="560" y1="380" x2="640" y2="348" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="630" y="375" text-anchor="middle" fill="#333" font-size="11">kubectl apply</text>

  <!-- Production Namespace Box -->
  <rect x="580" y="320" width="300" height="120" rx="8" fill="#0D47A1" stroke="#1565C0" stroke-width="2"/>
  <text x="730" y="348" text-anchor="middle" fill="white" font-weight="bold" font-size="14">kijani-project namespace</text>
  <text x="730" y="370" text-anchor="middle" fill="#BBDEFB" font-size="11">kk-payments x3 replicas (nginx:alpine)</text>
  <text x="730" y="390" text-anchor="middle" fill="#BBDEFB" font-size="11">DB_HOST: postgres-service</text>
  <text x="730" y="410" text-anchor="middle" fill="#BBDEFB" font-size="11">NODE_ENV: production</text>
  <text x="730" y="428" text-anchor="middle" fill="#90CAF9" font-size="10">kk-api x2 replicas also running</text>

  <!-- Prometheus Box -->
  <rect x="580" y="470" width="300" height="60" rx="8" fill="#880E4F" stroke="#AD1457" stroke-width="2"/>
  <text x="730" y="496" text-anchor="middle" fill="white" font-weight="bold">Prometheus Alert Rules</text>
  <text x="730" y="516" text-anchor="middle" fill="#FCE4EC" font-size="11">monitoring/alerts.yml (committed)</text>

  <!-- Arrow Production to Prometheus -->
  <line x1="730" y1="440" x2="730" y2="468" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="780" y="458" text-anchor="middle" fill="#333" font-size="10">monitors</text>

  <!-- Legend -->
  <rect x="40" y="470" width="320" height="90" rx="8" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
  <text x="200" y="492" text-anchor="middle" font-weight="bold" fill="#333">Same Deployment manifest — both namespaces</text>
  <text x="200" y="512" text-anchor="middle" fill="#555" font-size="11">Only ConfigMap differs between environments</text>
  <text x="200" y="530" text-anchor="middle" fill="#555" font-size="11">Staging: DB_HOST=postgres-staging-service</text>
  <text x="200" y="548" text-anchor="middle" fill="#555" font-size="11">Production: DB_HOST=postgres-service</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>