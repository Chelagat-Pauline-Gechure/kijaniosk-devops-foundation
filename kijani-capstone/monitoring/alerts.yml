groups:
  - name: kk-payments-alerts
    rules:
      - alert: KkPaymentsHighErrorRate
        expr: |
          sum(rate(http_requests_total{job="kk-payments",status=~"5.."}[2m]))
          /
          sum(rate(http_requests_total{job="kk-payments"}[2m])) > 0.05
        for: 2m
        labels:
          severity: critical
          service: kk-payments
        annotations:
          summary: "kk-payments error rate exceeds 5%"
          description: "kk-payments has had more than 5% error rate for 2 minutes. Current value: {{ $value }}"

      - alert: KkPaymentsPodRestartCount
        expr: |
          increase(kube_pod_container_status_restarts_total{
            namespace="kijani-staging",
            container="kk-payments"
          }[10m]) > 2
        for: 0m
        labels:
          severity: warning
          service: kk-payments
        annotations:
          summary: "kk-payments pod restarting frequently in staging"
          description: "kk-payments pod has restarted more than twice in the last 10 minutes"
